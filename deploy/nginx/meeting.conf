# 会议纪要助手 —— nginx 站点配置（方案B：域名 + HTTPS + 同源反代）
# 部署位置：/etc/nginx/conf.d/meeting.conf
# 域名：meeting.gigba-ai.cn   后端：127.0.0.1:8100
#
# 用法：
#   1) 先放这份（仅 80）：nginx -t && systemctl reload nginx
#   2) 再跑 certbot 自动加 443 + 跳转：
#        certbot --nginx -d meeting.gigba-ai.cn
#      certbot 会自动改本文件加上 listen 443 / ssl_certificate / http->https 跳转。
#
# 前提：
#   - 阿里云 A 记录 meeting -> 香港 ECS 公网 IP 已生效（dig meeting.gigba-ai.cn 能解析到 IP）
#   - 安全组放通 80 + 443（8100 不必对外）
#   - dist 已上传到 root 指定目录
#   - frontend/.env 用 VITE_API_BASE=/ 重新 build 过

server {
    listen 80;
    listen [::]:80;
    server_name meeting.gigba-ai.cn;

    # 静态文件目录（dist 解压到这里）
    root /opt/meeting/frontend/dist;
    index index.html;

    # SPA 路由兜底：react-router 前端路由刷新不 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到后端（前缀 /auth /meeting /hello，无 /api 前缀）
    location ~ ^/(auth|meeting|hello) {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 200m;   # 音频/文档上传，别被默认 1m 卡死(413)
        proxy_read_timeout 300s;     # 提交/轮询等长任务接口留足超时
        proxy_send_timeout 300s;
        # Content-Disposition（下载文件名）：后端已 expose_headers，nginx 默认透传，勿手动过滤
    }
}
